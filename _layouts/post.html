---
layout: default
title: {{ page.title }}
---

<article class="blog-post">
    <header>
        <h1>{{ page.title }}</h1>
        <p class="post-date">{{ page.date | date: "%B %d, %Y" }}</p>
    </header>

    <div class="post-content">
        {{ content }}
    </div>
</article>

<a href="{{ '/blog' | relative_url }}" class="back-to-blog" data-i18n="blog.back_to_blog">← Back to Blog</a>
