<!DOCTYPE html>
<html lang="{{ page.lang | default: site.default_lang | default: 'en' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <style>
        .lang-switcher {
            position: absolute;
            top: 10px;
            right: 20px;
        }
        .lang-switcher a {
            margin-left: 10px;
            text-decoration: none;
            color: #333;
            font-weight: bold;
        }
        .lang-switcher a.active {
            color: #007bff;
        }
        .lang-switcher a:hover {
            text-decoration: underline;
        }
        nav {
            position: relative;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="{{ '/' | relative_url }}">{% if page.lang == 'ru' %}Главная{% else %}Home{% endif %}</a>
            <a href="{% if page.lang == 'ru' %}{{ '/blog/' | prepend: '/ru' | prepend: site.baseurl }}{% else %}{{ '/blog/' | relative_url }}{% endif %}">{% if page.lang == 'ru' %}Блог{% else %}Blog{% endif %}</a>
            <div class="lang-switcher">
                {% if page.lang == 'ru' %}
                    <a href="{{ page.url | remove: '/ru' | replace: '//', '/' | prepend: site.baseurl }}" class="">EN</a>
                    <a href="#" class="active">RU</a>
                {% else %}
                    <a href="#" class="active">EN</a>
                    <a href="{{ '/ru' | append: page.url | replace: '//', '/' | prepend: site.baseurl }}" class="">RU</a>
                {% endif %}
            </div>
        </nav>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}</p>
    </footer>
</body>
</html>
