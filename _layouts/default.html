<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
    <header>
        <nav>
            <div class="nav-links">
                <a href="{{ '/' | relative_url }}" data-i18n="nav.home">Home</a>
                <a href="{{ '/blog/' | relative_url }}" data-i18n="nav.blog">Blog</a>
            </div>
            <select id="language-selector" class="language-selector">
                <option value="en">English</option>
                <option value="ru">Русский</option>
            </select>
        </nav>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        <p><span data-i18n="copyright">©</span> {{ site.time | date: '%Y' }} {{ site.title }}</p>
    </footer>
    
    <script src="{{ '/assets/js/language-switcher.js' | relative_url }}"></script>
</body>
</html>
